name: Build and Push Docker Image

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version:
        description: "Git tag to build (e.g. v0.3.3)"
        required: true

jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write  # required for Workload Identity Federation

    steps:
      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "value=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.version.outputs.value }}
          fetch-depth: 0  # required for setuptools-git-versioning to read tags

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for GCR
        run: gcloud auth configure-docker us.gcr.io

      - name: Build Docker image
        run: |
          docker build \
            --build-arg GIT_SHA=${{ github.sha }} \
            -t us.gcr.io/broad-dsde-methods/cellbender:${{ steps.version.outputs.value }} \
            -t us.gcr.io/broad-dsde-methods/cellbender:latest \
            .

      - name: Push Docker image
        run: |
          docker push us.gcr.io/broad-dsde-methods/cellbender:${{ steps.version.outputs.value }}
          docker push us.gcr.io/broad-dsde-methods/cellbender:latest
